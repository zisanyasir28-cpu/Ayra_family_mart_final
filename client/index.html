<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ayra Family Mart — Fresh groceries & daily essentials delivered fast across Bangladesh" />

    <!-- ── Google Fonts: Fraunces (serif display), Inter (body), Hind Siliguri (Bangla) ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,700&family=Inter:wght@400;500;600;700&family=Hind+Siliguri:wght@500;700&display=swap"
    />

    <title>Ayra Family Mart — মাটি ও ফুল</title>
    <meta name="theme-color" content="#0E0D0B" />

    <!-- ── Theme: apply persisted theme synchronously to prevent FOUT ────── -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('ayra:theme');
          var theme = raw ? (JSON.parse(raw).state || {}).theme : 'system';
          if (!theme) theme = 'system';
          var resolved =
            theme === 'system'
              ? matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
              : theme;
          document.documentElement.classList.add(resolved);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', resolved === 'dark' ? '#0E0D0B' : '#FBF7EC');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem('spa_redirect');
        if (redirect) {
          sessionStorage.removeItem('spa_redirect');
          history.replaceState(null, '', redirect || '/');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
