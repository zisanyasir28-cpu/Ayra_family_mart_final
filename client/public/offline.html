<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#16a34a" />
  <title>Offline · Ayra Family Mart</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:system-ui,-apple-system,sans-serif;
      background:#0a0a0a;
      color:#fff7e8;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      text-align:center;
    }
    .card{max-width:400px}
    .logo{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:80px;height:80px;
      border-radius:20px;
      background:#16a34a;
      color:#fff7e8;
      font-size:42px;font-weight:900;
      margin-bottom:24px;
    }
    h1{font-size:24px;font-weight:700;margin-bottom:8px}
    p{font-size:15px;color:#fff7e8aa;line-height:1.5;margin-bottom:24px}
    button{
      background:#fbbf24;
      color:#0a0a0a;
      border:none;
      padding:12px 28px;
      font-size:15px;font-weight:700;
      border-radius:24px;
      cursor:pointer;
      transition:transform .15s;
    }
    button:active{transform:scale(.96)}
    .hint{margin-top:20px;font-size:12px;color:#fff7e855}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">A</div>
    <h1>You're offline</h1>
    <p>It looks like your internet is down. Please check your connection and try again — your cart is saved.</p>
    <button onclick="location.reload()">Retry</button>
    <p class="hint">Ayra Family Mart · Bangladesh</p>
  </div>
</body>
</html>
