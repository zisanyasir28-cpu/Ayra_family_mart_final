<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Ayra Family Mart</title>
    <script>
      // GitHub Pages SPA redirect: store path in sessionStorage and redirect to root
      var path = window.location.pathname;
      var base = '/Ayra_family_mart_final';
      var rest = path.startsWith(base) ? path.slice(base.length) : path;
      sessionStorage.setItem('spa_redirect', rest + window.location.search);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
